name: remep_mobile
description: "ReMep Mobile - 移动健康系统应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # 状态管�?
  # 使用 ChangeNotifier + Modular 依赖注入

  # 网络
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # API 生成
  swagger_parser: ^1.5.0

  # 蓝牙
  flutter_blue_plus: ^1.31.0

  # MQTT
  mqtt_client: ^10.0.0

  # 存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # 路由
  go_router: ^14.0.0
  get_it: ^7.6.0

  # 数据模型
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 工具
  logger: ^2.0.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.0
  flutter_dotenv: ^5.1.0
  ultralytics_yolo: ^0.2.0
  sensors_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # 代码生成
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  mocktail: ^1.0.2
  openapi_generator: 5.0.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.development
    - .env.production
    - assets/images/
    - assets/icons/
    - assets/models/
