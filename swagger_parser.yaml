swagger_parser:
  schema_url: https://iomt.205716.xyz/api-docs/openapi.json
  output_directory: api/
  
  options:
    # 使用 dio_client 模板
    client_type: dio
    
    # 生成 JSON 序列化
    generate_json_serializable: true
    
    # 不使用 freezed
    use_freezed: false
    
    # 模型配置
    model_prefix: ''
    model_suffix: ''
    
    # API 配置
    api_prefix: ''
    api_suffix: ''
    
    # 生成枚举
    generate_enums: true
    
    # 日期时间格式
    date_time_format: 'iso8601'
    
    # 生成文档
    generate_docs: true
    
    # Null safety
    null_safety: true
  
  # 排除路径
  exclude_paths:
    - /health
    - /metrics
  
  # 类型映射
  type_mappings:
    DateTime: String
    Object: dynamic
